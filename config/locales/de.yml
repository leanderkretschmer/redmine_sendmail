  label_sendmail_use_project_alias_hint: "Wenn aktiv: bei Mails aus einem Projekt, dem im redmine_mail_handler eine Alias-Adresse zugeordnet ist, werden Absender und Antwort-An auf diese Alias-Adresse gesetzt (überschreibt obige Einstellungen für dieses Projekt)."

  label_sendmail_project_identifier_slice: "Projekt-Kennung Zeichenbereich"
  label_sendmail_project_identifier_slice_hint: "Steuert, welcher Teil der Projekt-Kennung über den Platzhalter {projekt-kennung} eingefügt wird. Leer oder 'all' = komplette Kennung. Bereich wie '1-8' nimmt Zeichen 1 bis 8, '4-8' Zeichen 4 bis 8. Beispiel: 'PFP12345-detail' mit '1-8' → 'PFP12345'."
  label_sendmail_log_dispatches: "Versand protokollieren"
