  label_sendmail_project_info_intro: "Diese beiden Felder können frei belegt werden und stehen anschließend in den Mail-Vorlagen (Betreff, Text, Absender, Antwort-An, Absender-Name) als Platzhalter {project_info_1} bzw. {project_info_2} zur Verfügung."
  label_sendmail_project_info_1: "Projekt-Info 1"
  label_sendmail_project_info_1_hint: "Frei wählbarer Wert, im Template als {project_info_1} nutzbar."
  label_sendmail_project_info_2: "Projekt-Info 2"
  label_sendmail_project_info_2_hint: "Frei wählbarer Wert, im Template als {project_info_2} nutzbar."

