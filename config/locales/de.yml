  label_sendmail_from_email_hint: "Optional. Platzhalter erlaubt (z. B. {projekt-kennung}@example.com oder {project_info_1}). Reihenfolge: dieses Feld → SMTP-Konto aus redmine_mail_handler → Redmines Standard-Absenderadresse."
  label_sendmail_from_name: "Absender-Name"
  label_sendmail_from_name_hint: "Optional. Angezeigter Name vor der Absender-Adresse (z. B. „Support {project_name}“). Platzhalter erlaubt. Leer = nur die Adresse."
  label_sendmail_reply_to_email: "Antwort-An (Reply-To)"
  label_sendmail_reply_to_email_hint: "Platzhalter erlaubt (z. B. {projekt-kennung}@example.com). Wenn leer, wird das Mailkonto aus den SMTP-Einstellungen des redmine_mail_handler verwendet (sofern vorhanden). Der angemeldete Redmine-Benutzer wird nie als Reply-To gesetzt."

