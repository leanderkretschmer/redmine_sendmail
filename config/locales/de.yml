  label_sendmail_project_smtp_intro: "Wenn aktiv, werden Mails dieses Projekts über das hier konfigurierte SMTP-Konto verschickt — andernfalls greift die globale Versand-Konfiguration."
  label_sendmail_smtp_password_keep_hint: "Leer lassen, um das bereits gespeicherte Passwort beizubehalten."
