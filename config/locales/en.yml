en:
  project_module_sendmail: "Sendmail"
  permission_send_sendmail: "Send mails to contacts"

  label_sendmail: "Mail dispatch"
  label_sendmail_settings_title: "Mail templates"
  label_sendmail_subject_template: "Subject template"
  label_sendmail_subject_template_hint: "Available placeholders are listed below. Default: [#TICKET] SUBJECT"
  label_sendmail_body_template: "Body template / footer"
  label_sendmail_from_email: "From address"
  label_sendmail_from_email_hint: "Optional. Placeholders allowed (e.g. {projekt-kennung}@example.com or {project_info_1}). Resolution order: this field → SMTP account from redmine_mail_handler → Redmine's default sender."
  label_sendmail_from_name: "From name"
  label_sendmail_from_name_hint: "Optional. Display name shown before the from address (e.g. \"Support {project_name}\"). Placeholders allowed. Empty = address only."
  label_sendmail_reply_to_email: "Reply-To address"
  label_sendmail_reply_to_email_hint: "Placeholders allowed (e.g. {projekt-kennung}@example.com). If empty, the SMTP account from the redmine_mail_handler plugin is used (when available). The logged-in Redmine user is never used as Reply-To."

  label_sendmail_use_project_alias: "Use project alias from address matrix"
  label_sendmail_use_project_alias_hint: "When enabled: for mails from a project that has an alias mapping in redmine_mail_handler, From and Reply-To are set to that alias address (overrides the fields above for that project)."

  label_sendmail_project_identifier_slice: "Project identifier slice"
  label_sendmail_project_identifier_slice_hint: "Controls which part of the project identifier is inserted by the {projekt-kennung} placeholder. Empty or 'all' returns the full identifier. A range like '1-8' takes characters 1..8, '4-8' takes characters 4..8. Example: 'PFP12345-detail' with '1-8' yields 'PFP12345'."
  label_sendmail_log_dispatches: "Log dispatches"
  label_sendmail_placeholders: "Available placeholders"

  label_sendmail_send_to_contact: "Send comment as e-mail"
  label_sendmail_send_new_issue: "Send ticket as e-mail to contact"
  label_sendmail_will_send_new_issue_hint: "When the ticket is created, its description (with images as attachments) is e-mailed to the selected contact(s). The ticket title is used as the subject."
  label_sendmail_recipient: "Recipient"
  label_sendmail_recipients: "Recipients"
  label_sendmail_recipients_hint: "Pick one or more contacts. Each recipient receives a personalised mail."
  label_sendmail_no_recipient: "— No mail —"
  label_sendmail_no_contacts_in_project: "No contacts with e-mail addresses in this project."
  label_sendmail_subject: "Subject"
  label_sendmail_subject_placeholder: "Subject (ticket id [#%{ticket_id}] is added automatically)"
  label_sendmail_will_send_hint: "When you save the ticket, your comment will be sent to the selected contact."
  label_sendmail_body: "Mail body"
  label_sendmail_no_dispatches: "No mails have been sent from this project yet."
  label_sendmail_status_sent: "Sent"
  label_sendmail_status_failed: "Failed"
  label_sendmail_sent_to: "Sent by e-mail to"

  label_sendmail_smtp_section: "SMTP delivery"
  label_sendmail_smtp_intro: "By default, Redmine's global ActionMailer (configuration.yml) is used. Optionally, a dedicated SMTP account can be configured for customer mails."
  label_sendmail_smtp_use_mail_handler: "Reuse SMTP from redmine_mail_handler"
  label_sendmail_smtp_use_mail_handler_hint: "Reads host/port/user/password from the redmine_mail_handler plugin settings."
  label_sendmail_use_custom_smtp: "Enable custom SMTP"
  label_sendmail_smtp_host: "SMTP server"
  label_sendmail_smtp_port: "Port"
  label_sendmail_smtp_ssl: "SSL/TLS"
  label_sendmail_smtp_ssl_hint: "Implicit TLS, typical on port 465."
  label_sendmail_smtp_starttls: "STARTTLS"
  label_sendmail_smtp_starttls_hint: "Typical on port 587."
  label_sendmail_smtp_username: "Username"
  label_sendmail_smtp_password: "Password"
  label_sendmail_smtp_authentication: "Authentication"
  label_sendmail_smtp_domain: "HELO domain"
  label_sendmail_smtp_domain_hint: "Optional. Domain the mailer announces to the server."

  help_sendmail_user_name: "Name of the currently logged-in user (use this for the signature)"
  help_sendmail_ticket_id: "Ticket id of the issue from which the mail is sent"
  help_sendmail_custom_subject: "Subject typed by the user in the ticket form"
  help_sendmail_comment: "Body of the ticket comment"
  help_sendmail_projekt_kennung: "Redmine project identifier, optionally limited to a character range (see setting above)"
  help_sendmail_project_info: "Free per-project fields (edit under Project → Settings → Mail dispatch)"

  permission_manage_sendmail_settings: "Manage mail dispatch settings"
  label_sendmail_project_info_intro: "These two free-text fields can hold anything and are then available in the mail templates (subject, body, from, reply-to, from name) as the placeholders {project_info_1} and {project_info_2}."
  label_sendmail_project_info_1: "Project info 1"
  label_sendmail_project_info_1_hint: "Free value, usable in templates as {project_info_1}."
  label_sendmail_project_info_2: "Project info 2"
  label_sendmail_project_info_2_hint: "Free value, usable in templates as {project_info_2}."
